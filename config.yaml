# cwkr data source configuration
#
# Each entry under `sources` defines one logical information stream.
# `type` must match a key in scripts/sources/__init__.py SOURCE_REGISTRY.
#
# To add a new source type (e.g. web_article, zhihu, google_groups):
#   1. Create scripts/sources/<type>.py implementing DataSource
#   2. Register it in SOURCE_REGISTRY
#   3. Add a block here with the matching `type` value

sources:

  # ── llm-d SIG Autoscaling ──────────────────────────────────────────
  # Primary repos: llm-d (main), inference-scheduler, workload-variant-autoscaler
  - id: llm-d/sig-autoscaling
    type: github
    component: "cwkr:component/llm-d/sig-autoscaling"
    repos:
      - "llm-d/llm-d"
      - "llm-d/llm-d-inference-scheduler"
      - "llm-d/llm-d-workload-variant-autoscaler"
    labels:
      - "sig/autoscaling"
      - "area/autoscaling"
    search_terms:
      - "autoscaling"
      - "auto-scaling"
      - "kpa"
      - "keda"
      - "hpa"
      - "inference scaling"
      - "scale to zero"
      - "scheduler"

  # ── llm-d SIG Benchmarking ─────────────────────────────────────────
  # Primary repos: llm-d-benchmark, llm-d-prism (perf analysis), llm-d-latency-predictor
  - id: llm-d/sig-benchmarking
    type: github
    component: "cwkr:component/llm-d/sig-benchmarking"
    repos:
      - "llm-d/llm-d"
      - "llm-d/llm-d-benchmark"
      - "llm-d/llm-d-prism"
      - "llm-d/llm-d-latency-predictor"
    labels:
      - "sig/benchmarking"
      - "area/benchmark"
      - "area/performance"
    search_terms:
      - "benchmark"
      - "benchmarking"
      - "performance"
      - "latency"
      - "throughput"
      - "qps"
      - "ttft"
      - "tpot"
      - "profiling"

  # ── Kubernetes SIG Network / Multi-Network ─────────────────────────
  # Primary org: k8snetworkplumbingwg (Network Plumbing Working Group)
  # Key repos: multus-cni, multi-networkpolicy, multus-dynamic-networks-controller
  # Also: kubernetes/enhancements for KEPs, kubernetes/community for SIG meeting notes
  - id: kubernetes/sig-network-multi-network
    type: github
    component: "cwkr:component/kubernetes/sig-network-multi-network"
    repos:
      - "k8snetworkplumbingwg/multus-cni"
      - "k8snetworkplumbingwg/multi-networkpolicy"
      - "k8snetworkplumbingwg/multus-dynamic-networks-controller"
      - "k8snetworkplumbingwg/whereabouts"
      - "kubernetes/enhancements"
      - "kubernetes/community"
    labels:
      - "sig/network"
      - "area/multi-network"
      - "area/multus"
    search_terms:
      - "multi-network"
      - "multiple network"
      - "multus"
      - "network-attachment-definition"
      - "secondary network"
      - "nad"
      - "ipvlan"
      - "macvlan"
      - "network plumbing"

